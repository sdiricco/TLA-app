# fly.toml app configuration file generated for tla-app on 2026-06-24T08:19:27Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'tla-app'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
